<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="1000" height="420" xml:space="preserve">
    <defs>
        <style>
            .fnt { font-family: 'Fira Code', Consolas, Monaco, 'Courier New', Courier, monospace; font-size: 13.5px; font-weight: 500; }
            .txt-wht { fill: #E6EDF3; }
            .txt-grn { fill: #27C93F; }
            .txt-blu { fill: #3794FF; }
            .txt-red { fill: #FF5F56; }
            .txt-ylw { fill: #FFBD2E; }
            .txt-cyn { fill: #1793D1; }
            .txt-gry { fill: #8B949E; }
            .txt-prp { fill: #C678DD; }
            .txt-par { fill: #00E6E6; }

            @keyframes blink {
                0%, 100% { opacity: 1; }
                50% { opacity: 0; }
            }
            .cursor { animation: blink 1s step-end infinite; }
        </style>

        <clipPath id="type-1">
            <rect x="70" y="75" width="0" height="20">
                <animate attributeName="width" values="0;260" begin="0.5s" dur="1.2s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="type-2">
            <rect x="70" y="265" width="0" height="20">
                <animate attributeName="width" values="0;140" begin="5.8s" dur="0.8s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="type-3">
            <rect x="70" y="355" width="0" height="20">
                <animate attributeName="width" values="0;320" begin="9.8s" dur="1.0s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="type-4">
            <rect x="825" y="55" width="0" height="20">
                <animate attributeName="width" values="0;100" begin="0.5s" dur="1.0s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="type-5">
            <rect x="685" y="250" width="0" height="20">
                <animate attributeName="width" values="0;240" begin="4.8s" dur="1.2s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="matrix-clip">
            <rect x="592" y="222" width="396" height="186" rx="0" />
        </clipPath>
    </defs>

    <rect width="1000" height="420" fill="#0D1117" rx="10" />
    <rect x="10" y="10" width="980" height="400" fill="#121820" rx="8" stroke="#3d4450" stroke-width="2"/>

    <g clip-path="url(#matrix-clip)" class="fnt txt-grn" font-size="12" opacity="0.12">
        <text x="650" y="-100">
            <tspan x="650" dy="15">B</tspan><tspan x="650" dy="15">L</tspan><tspan x="650" dy="15">O</tspan><tspan x="650" dy="15">G</tspan><tspan x="650" dy="15">0</tspan><tspan x="650" dy="15">1</tspan>
            <animate attributeName="y" values="-100;400" dur="4s" repeatCount="indefinite" />
        </text>
        <text x="750" y="-200">
            <tspan x="750" dy="15">T</tspan><tspan x="750" dy="15">T</tspan><tspan x="750" dy="15">Y</tspan><tspan x="750" dy="15">1</tspan><tspan x="750" dy="15">0</tspan>
            <animate attributeName="y" values="-200;400" dur="3.5s" repeatCount="indefinite" />
        </text>
        <text x="850" y="-50">
            <tspan x="850" dy="15">N</tspan><tspan x="850" dy="15">M</tspan><tspan x="850" dy="15">A</tspan><tspan x="850" dy="15">P</tspan><tspan x="850" dy="15">!</tspan>
            <animate attributeName="y" values="-50;400" dur="5s" repeatCount="indefinite" />
        </text>
        <text x="950" y="-150">
            <tspan x="950" dy="15">R</tspan><tspan x="950" dy="15">S</tspan><tspan x="950" dy="15">S</tspan><tspan x="950" dy="15">0</tspan><tspan x="950" dy="15">2</tspan>
            <animate attributeName="y" values="-150;400" dur="4.2s" repeatCount="indefinite" />
        </text>
    </g>

    <path d="M 10 18 Q 10 10 18 10 L 982 10 Q 990 10 990 18 L 990 40 L 10 40 Z" fill="#1e252e" />
    <circle cx="30" cy="25" r="6" fill="#FF5F56" />
    <circle cx="50" cy="25" r="6" fill="#FFBD2E" />
    <circle cx="70" cy="25" r="6" fill="#27C93F" />
    <text x="500" y="30" class="fnt txt-gry" text-anchor="middle" font-size="13">blazepwn@profile-rig:~</text>

    <line x1="590" y1="40" x2="590" y2="410" stroke="#3d4450" stroke-width="2" />
    <line x1="590" y1="220" x2="990" y2="220" stroke="#3d4450" stroke-width="2" />

    <text x="30" y="70" class="fnt">
        <tspan class="txt-blu">┌──(</tspan><tspan class="txt-wht">blazepwn</tspan><tspan class="txt-blu">㉿kali)-[</tspan><tspan class="txt-wht">~/about</tspan><tspan class="txt-blu">]</tspan>
    </text>
    <text x="30" y="90" class="fnt txt-blu">└─$</text>
    <g opacity="0">
