        <text x="30" y="130" opacity="0"><animate attributeName="opacity" values="1" begin="2.3s" dur="0.1s" fill="freeze" />Nombre : Emmanuel Aguilar Montano</text>
        <text x="30" y="150" opacity="0"><animate attributeName="opacity" values="1" begin="2.6s" dur="0.1s" fill="freeze" />Rol    : Ingeniero en Redes Inteligentes y Ciberseguridad</text>
        <text x="30" y="170" opacity="0"><animate attributeName="opacity" values="1" begin="2.9s" dur="0.1s" fill="freeze" />Blog   : ciberseguridad / hacking / redes / linux</text>
        <text x="30" y="190" class="txt-cyn" opacity="0"><animate attributeName="opacity" values="1" begin="3.2s" dur="0.1s" fill="freeze" />Site   : https://blazepwn.com</text>
    </g>

