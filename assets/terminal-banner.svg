        </text>
        <text x="620" y="325" opacity="0">
            <animate attributeName="opacity" values="1" begin="7.1s" dur="0.1s" fill="freeze" />
            <tspan class="txt-wht">- Nmap - Enumeracion de Servicios</tspan>
        </text>
        <text x="620" y="345" opacity="0">
            <animate attributeName="opacity" values="1" begin="7.5s" dur="0.1s" fill="freeze" />
            <tspan class="txt-wht">- Nmap - Firewall IDS/IPS Evasion</tspan>
        </text>
        <text x="620" y="365" opacity="0">
            <animate attributeName="opacity" values="1" begin="7.9s" dur="0.1s" fill="freeze" />
            <tspan class="txt-wht">- Ansible y Playbooks</tspan>
        </text>
    </g>

    <rect x="405" y="358" width="8" height="15" fill="#E6EDF3" class="cursor" opacity="0">
        <animate attributeName="opacity" values="0;1" begin="11s" dur="0.1s" fill="freeze" />
    </rect>

</svg>
