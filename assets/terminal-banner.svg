        <text x="30" y="340" opacity="0"><animate attributeName="opacity" values="1" begin="7.4s" dur="0.1s" fill="freeze" />nmap-firewall-ids-ips-evasion</text>
    </g>

    <g opacity="0">
        <animate attributeName="opacity" values="1" begin="9.2s" dur="0.1s" fill="freeze" />
        <text x="30" y="350" class="fnt">
            <tspan class="txt-blu">┌──(</tspan><tspan class="txt-wht">blazepwn</tspan><tspan class="txt-blu">㉿kali)-[</tspan><tspan class="txt-wht">~/focus</tspan><tspan class="txt-blu">]</tspan>
        </text>
        <text x="30" y="370" class="fnt txt-blu">└─$</text>
    </g>
    <g opacity="0">
        <animate attributeName="opacity" values="1" begin="9.8s" dur="0.1s" fill="freeze" />
        <text x="70" y="370" class="fnt txt-wht" clip-path="url(#type-3)">printf "%s\n" pentesting linux redes hyprland</text>
    </g>

    <text x="620" y="70" class="fnt">
