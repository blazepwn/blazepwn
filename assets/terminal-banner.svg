    </text>
    <g opacity="0">
        <animate attributeName="opacity" values="1" begin="0.5s" dur="0.1s" fill="freeze" />
        <text x="825" y="70" class="fnt txt-wht" clip-path="url(#type-4)">neofetch</text>
    </g>

    <text x="620" y="90" class="fnt" opacity="0">
        <animate attributeName="opacity" values="1" begin="2s" dur="0.1s" fill="freeze" />
        <tspan x="620" dy="0"><tspan class="txt-cyn">&#160;&#160;&#160;&#160;&#160;&#160;/\</tspan><tspan x="740" class="txt-wht">OS: </tspan><tspan class="txt-gry">Arch Linux x86_64</tspan></tspan>
        <tspan x="620" dy="16"><tspan class="txt-cyn">&#160;&#160;&#160;&#160;&#160;/&#160;&#160;\</tspan><tspan x="740" class="txt-wht">WM: </tspan><tspan class="txt-gry">Hyprland</tspan></tspan>
        <tspan x="620" dy="16"><tspan class="txt-cyn">&#160;&#160;&#160;&#160;/&#160;&#160;&#160;&#160;\</tspan><tspan x="740" class="txt-wht">Shell: </tspan><tspan class="txt-gry">zsh 5.9</tspan></tspan>
        <tspan x="620" dy="16"><tspan class="txt-cyn">&#160;&#160;&#160;/&#160;&#160;&#160;&#160;&#160;&#160;\</tspan><tspan x="740" class="txt-wht">Role: </tspan><tspan class="txt-gry">blog tecnico / pentesting</tspan></tspan>
        <tspan x="620" dy="16"><tspan class="txt-cyn">&#160;&#160;/&#160;&#160;&#160;,,&#160;&#160;&#160;\</tspan><tspan x="740" class="txt-wht">Site: </tspan><tspan class="txt-gry">blazepwn.com</tspan></tspan>
        <tspan x="620" dy="16"><tspan class="txt-cyn">&#160;/&#160;&#160;&#160;|&#160;&#160;|&#160;&#160;&#160;\</tspan><tspan x="740" class="txt-wht">Focus: </tspan><tspan class="txt-gry">nmap, tty, ansible, linux</tspan></tspan>
        <tspan x="620" dy="16"><tspan class="txt-cyn">/_-''&#160;&#160;&#160;&#160;''-_\</tspan><tspan x="740" class="txt-wht">Lang: </tspan><tspan class="txt-gry">es</tspan></tspan>
    </text>

    <g opacity="0">
        <animate attributeName="opacity" values="1" begin="4.2s" dur="0.1s" fill="freeze" />
        <text x="620" y="245" class="fnt">
            <tspan class="txt-par">┌─[</tspan><tspan class="txt-wht">blazepwn@rss</tspan><tspan class="txt-par">]─[</tspan><tspan class="txt-wht">~/feed</tspan><tspan class="txt-par">]</tspan>
        </text>
        <text x="620" y="265" class="fnt txt-par">└──╼ $</text>
    </g>

    <g opacity="0">
