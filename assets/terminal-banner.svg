<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06090D"/>
      <stop offset="1" stop-color="#0A1016"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0E0E1" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#E0E0E1" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#E0E0E1" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" stroke="#E0E0E1" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
