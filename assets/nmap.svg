<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.1" />
        </filter>
        <clipPath id="eyeClip">
            <path d="M12,48 Q50,22 88,48 Q50,74 12,48 Z" />
        </clipPath>
    </defs>

    <rect width="100" height="100" rx="20" fill="#0f172a" filter="url(#drop-shadow)"/>

    <rect x="2" y="2" width="96" height="96" rx="18"
          fill="none"
          stroke="#1e293b"
          stroke-width="2" />

    <g stroke="#38bdf8" stroke-width="1" opacity="0.3">
        <line x1="22" y1="22" x2="50" y2="50" />
        <line x1="78" y1="22" x2="50" y2="50" />
        <line x1="22" y1="65" x2="50" y2="50" />
        <line x1="78" y1="65" x2="50" y2="50" />
    </g>
    <g fill="#38bdf8">
        <circle cx="22" cy="22" r="1.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" /></circle>
        <circle cx="78" cy="22" r="1.5"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" /></circle>
        <circle cx="22" cy="65" r="1.5"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" /></circle>
        <circle cx="78" cy="65" r="1.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" /></circle>
    </g>

    <path d="M12,48 Q50,22 88,48 Q50,74 12,48 Z" fill="#f8fafc" stroke="#38bdf8" stroke-width="1.2" />

    <g clip-path="url(#eyeClip)">
        <g>
            <animateTransform
                attributeName="transform"
                type="translate"
                values="0,0; 12,0; -12,0; 0,0"
                dur="3.5s"
                repeatCount="indefinite"
            />
            <circle cx="50" cy="48" r="13" fill="#0284c7" />
            <circle cx="50" cy="48" r="9" fill="#38bdf8" />
            <circle cx="50" cy="48" r="5" fill="#0f172a" />
            <circle cx="46" cy="44" r="2" fill="#ffffff" opacity="0.8" />
        </g>
    </g>

    <rect x="15" y="20" width="70" height="1.5" fill="#4ade80" opacity="0.8">
        <animate attributeName="y" values="22;72;22" dur="2.5s" repeatCount="indefinite" />
    </rect>

    <text x="50" y="88" font-family="monospace" font-size="12" font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="1.5">NMAP</text>
</svg>
